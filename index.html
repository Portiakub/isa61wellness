<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
  scroll-behavior:smooth;
}

body{
  background:#ffffff;
  color:#333;
  line-height:1.6;
}

/* HEADER WITH GLASSY MAROON */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 30px;
  text-align:center;
  background:rgba(122,31,61,0.35); /* maroon with transparency */
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

header nav{
  display:flex;
  gap:40px;
}

nav a{
  color:white;
  text-decoration:none;
  font-size:16px;
  font-weight:500;
}

nav a:hover{
  opacity:0.7;
}

/* LOGO RIGHT CORNER */
header img.logo{
  position:absolute;
  top:10px;
  right:20px;
  height:50px;
}

/* HERO SLIDESHOW */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  animation:fade 18s infinite;
}

.slide:nth-child(1){background-image:url("office environment.jpg");animation-delay:0s;}
.slide:nth-child(2){background-image:url("counselling spaces.jpg");animation-delay:6s;}
.slide:nth-child(3){background-image:url("therapy sessions.jpg");animation-delay:12s;}

@keyframes fade{
  0%{opacity:0}
  10%{opacity:1}
  33%{opacity:1}
  43%{opacity:0}
  100%{opacity:0}
}

/* HERO TITLE WITH TRANSPARENT MAROON BORDER */
.hero-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  text-align:center;
  padding:30px;
  border:2px solid rgba(122,31,61,0.5); /* maroon see-through border */
  border-radius:10px;
  backdrop-filter:blur(3px);
}

.hero-text h1{
  font-size:42px;
  margin-bottom:10px;
}

.hero-text p{
  font-size:20px;
}

/* SECTIONS */
.section{
  padding:80px 10%;
  opacity:0;
  transform:translateY(40px);
  transition:all 1s;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

/* TWO COLUMN */
.two-column{
  display:flex;
  flex-wrap:wrap;
  gap:40px;
  align-items:center;
}

.two-column img{
  width:420px;
  border-radius:10px;
}

/* GALLERY */
.gallery{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
}

.gallery img{
  width:260px;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  transition:0.4s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* SOFT COLOR SECTION */
.soft{
  background:#f3f6f8;
}

/* BOOKING FORM */
form{
  max-width:500px;
  margin:auto;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:12px 25px;
  background:#7a1f3d; /* maroon button */
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* MAP SECTION */
.map-section{
  background:url("wellness activities.jpg") center/cover no-repeat;
  color:white;
  text-align:center;
  padding:100px 10%;
  border-radius:10px;
}

.map-section iframe{
  margin-top:30px;
  border-radius:10px;
  width:100%;
  height:350px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px 20px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
}

/* FOOTER WITH GLASSY MAROON */
footer{
  text-align:center;
  padding:20px;
  background:rgba(122,31,61,0.35); /* maroon see-through footer */
  color:white;
  backdrop-filter:blur(10px);
}

</style>
